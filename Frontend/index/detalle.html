<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="detalle_titulo_pestana">Detalle Tratamiento | Dentology</title>

  <link rel="stylesheet" href="../styles/inicio.css">
  <link rel="stylesheet" href="../styles/tema.css">
  <link rel="stylesheet" href="../styles/servicios.css">
  <link rel="stylesheet" href="../styles/idioma.css"> </head>

<body>
  <header class="site-header">
    <a href="/Frontend/index/lobby.html">
      <figure class="logo">
        <img src="/Media/Logo.png" alt="Logo Dentology">
      </figure>
    </a>

    <nav class="main-nav">
      <a data-i18n="inicio" href="/Frontend/index/lobby.html">Inicio</a>
      <a data-i18n="tratamientos" href="/Frontend/index/servicios.html">Tratamientos</a>
      <a data-i18n="citas" href="/Frontend/index/PaginaUsuario/usuario.html">Citas</a>
      <a data-i18n="contacto" href="/Frontend/index/contacto.html">Contacto</a>
      <a data-i18n="login" href="/Frontend/index/inicio.html">Inicio Sesion</a>
      
      <button id="theme-toggle" type="button">🌙</button>

      <button id="btn-es" type="button" aria-label="Español">🇪🇸</button>
      <button id="btn-en" type="button" aria-label="English">🇺🇸</button>
    </nav>
  </header>

  <main>
    <section class="tratamientos-grid">
      <section id="contenedor-detalle" class="contenedor-servicios">
        <div style="text-align: center; padding: 50px; color: #666;">
          <p data-i18n="cargando_detalle">Cargando detalles del tratamiento...</p>
        </div>
      </section>
    </section>
  </main>

  <script src="/Frontend/js/tema.js"></script>
  <script src="/Frontend/index/carrito/carrito.js"></script>

  <script type="module">
    import { cargarUnSoloProducto } from "/Frontend/js/detalles.js";

    document.addEventListener("DOMContentLoaded", async () => {
      await cargarUnSoloProducto();
    });

    document.addEventListener("click", (e) => {
      if (e.target.id === "agendarBtn") {
        const servicio = e.target.getAttribute("data-servicio");
        window.location.href = "/Frontend/index/citas.html?servicio=" + encodeURIComponent(servicio);
      }
    });
  </script>

  <script src="../js/idioma.js"></script> </body>
</html>

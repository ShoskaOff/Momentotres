<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="citas_pestana">Dentology - Agendar Cita</title>
    
    <link rel="stylesheet" href="/Frontend/styles/servicios.css">
    <link rel="stylesheet" href="/Frontend/styles/citas.css">
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/idioma.css">
    
    <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>
    <header class="site-header">
        <a href="/Frontend/index/lobby.html">
            <figure class="logo">
                <img src="/Media/Logo.png" alt="Dentology Logo">
            </figure>
        </a>
        <nav class="main-nav">
            <a data-i18n="inicio" href="/Frontend/index/lobby.html">Inicio</a>
            <a data-i18n="tratamientos" href="/Frontend/index/servicios.html">Tratamientos</a>
            <a data-i18n="citas" href="/Frontend/index/citas.html" class="active">Citas</a>
            <a data-i18n="contacto" href="/Frontend/index/contacto.html">Contacto</a>
            <a data-i18n="login" href="/Frontend/index/inicio.html">Inicio Sesión</a>
            
            <a id="theme-toggle" style="cursor: pointer;">🌙</a>
            <a href="/Frontend/index/carrito/carritoo.html" id="carritoIcono">🛒</a>

            <button id="btn-es" type="button" aria-label="Español">🇪🇸</button>
            <button id="btn-en" type="button" aria-label="English">🇺🇸</button>
        </nav>
    </header>

    <main>
        <section class="contenedor-formulario">
            <form id="formCita" class="formulario-estilo">
                <h2 data-i18n="agendar_cita_titulo">Agendar tu Cita</h2>

                <p id="servicioSeleccionado" data-i18n="servicio_default" style="font-weight: bold; color: #2196F3;">Servicio: Seleccione un tratamiento</p>
                
                <input type="hidden" id="servicio">

                <div class="campo">
                    <label for="fecha" data-i18n="fecha_label">Fecha:</label>
                    <input type="date" id="fecha" required>
                </div>

                <div class="campo">
                    <label for="hora" data-i18n="hora_label">Hora:</label>
                    <input type="time" id="hora" step="1800" required>
                </div>
                
                <button type="submit" class="btn-agendar" data-i18n="confirmar_cita_btn">Confirmar Cita</button>
            </form>
        </section>

        <section class="contenedor-historial">
            <h2 data-i18n="mis_citas_titulo" style="text-align: center; color: white; margin-top: 40px;">Mis Citas Programadas</h2>
            <div id="listaCitas">
                </div>
        </section>
    </main>

    <footer class="pie-pagina">
        <nav class="footer_navegacion">
            <p data-i18n="terminos" class="contenido_footer">Términos de Servicio</p>
            <p data-i18n="privacidad" class="contenido_footer">Política de Privacidad</p>
        </nav>
        <aside class="barra_inferior">
            <p data-i18n="derechos" class="derechos_reservados">©2026 DENTOLOGY. Todos los derechos reservados.</p>
        </aside>
    </footer>

    <script type="module" src="/Frontend/js/citas.js"></script>
    <script src="/Frontend/js/tema.js"></script>
    <script src="/Frontend/js/idioma.js"></script>

    <script>
        // Validación extra: No permitir seleccionar fechas pasadas en el calendario
        const fechaInput = document.getElementById('fecha');
        const hoy = new Date().toISOString().split('T')[0];
        fechaInput.setAttribute('min', hoy);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle Tratamiento | Dentology</title>

  <link rel="stylesheet" href="/Frontend/styles/servicios.css">
  <link rel="stylesheet" href="/Frontend/styles/tratamientos.css">
  <link rel="stylesheet" href="/Frontend/styles/tema.css">
  <link rel="stylesheet" href="/Frontend/styles/responsive.css">
</head>

<body>
  <header class="site-header">
    <a href="/Frontend/index/lobby.html">
      <figure class="logo">
        <img src="/Media/Logo.png" alt="Logo Dentology">
      </figure>
    </a>

    <nav class="main-nav">
      <a href="/Frontend/index/lobby.html">Inicio</a>
      <a href="/Frontend/index/servicios.html">Tratamientos</a>
      <a href="/Frontend/index/PaginaUsuario/usuario.html">Citas</a>
      <a href="/Frontend/index/contacto.html">Contacto</a>
      <a href="/Frontend/index/inicio.html">Inicio Sesion</a>
      <button id="theme-toggle" type="button">🌙</button>
    </nav>
  </header>

  <main>
    <section class="tratamientos-grid">
      <section id="contenedor-detalle" class="contenedor-servicios">
        <div style="text-align: center; padding: 50px; color: #666;">
          <p>Cargando detalles del tratamiento...</p>
        </div>
      </section>
    </section>
  </main>

  <script src="/Frontend/js/tema.js"></script>
  <script src="/Frontend/index/carrito/carrito.js"></script>

  <script type="module">
    import { cargarUnSoloProducto } from "/Frontend/js/detalles.js";

    document.addEventListener("DOMContentLoaded", async () => {
      await cargarUnSoloProducto();
    });

    document.addEventListener("click", (e) => {
      if (e.target.id === "agendarBtn") {
        const servicio = e.target.getAttribute("data-servicio");
        window.location.href = "/Frontend/index/citas.html?servicio=" + encodeURIComponent(servicio);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Frontend/styles/contacto.css">
    <link rel="stylesheet" href="/Frontend/styles/servicios.css">
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/responsive.css">
    <link rel="icon" href="/Media/favicon.png" type="image/png">
    <script src="/Frontend/js/servicios.js"></script>
    <title>Contacto</title>
</head>

<body>
    <header class="site-header">
        <a href="/Frontend/index/lobby.html"><figure class="logo"><img src="/Media/Logo.png" alt="image/png"></figure></a>
        <nav class="main-nav">
            <a href="/Frontend/index/lobby.html">Inicio</a>
            <a href="/Frontend/index/servicios.html">Tratamientos</a>
            <a href="/Frontend/index/citas.html">Citas</a>
            <a href="/Frontend/index/contacto.html">Contacto</a>
            <a href="/Frontend/index/inicio.html">Inicio Sesion</a>
            <a href="/Frontend/index/carrito/carritoo.html" id="carritoIcono">🛒</a>
            <a id="theme-toggle" type="button">🌙</a>
        </nav>
    </header>

    <main>

        <section class="contacto-container">
            <hgroup class="contacto-header">
                <h1 class="titulo-contacto">Contáctanos</h1>
                <p>Estamos aquí para cuidar de tu sonrisa. Envíanos un mensaje y te responderemos lo antes posible.</p>
            </hgroup>

            <form class="formulario-contacto">
                <fieldset class="grupo-input">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </fieldset>

                <fieldset class="grupo-input">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </fieldset>

                <fieldset class="grupo-input">
                    <label for="asunto">Asunto</label>
                    <input type="text" id="asunto" name="asunto" placeholder="¿En qué podemos ayudarte?">
                </fieldset>

                <fieldset class="grupo-input">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..."
                        required></textarea>
                </fieldset>

                <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            </form>
        </section>

    </main>
    <footer class="pie-pagina">
        <nav class="footer_navegacion">
            <p class="contenido_footer">Términos de Servicio</p>
            <p class="contenido_footer">Política de Privacidad</p>
        </nav>
        <aside class="barra_inferior">
            <p class="derechos_reservados">©DENTOLOGY. Todos los derechos reservados.</p>
        </aside>
    </footer>
    <script src="/Frontend/js/tema.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseño de Sonrisa</title>
  <link rel="stylesheet" href="/Frontend/styles/servicios.css">
  <link rel="stylesheet" href="/Frontend/styles/tratamientos.css">
  <link rel="stylesheet" href="/Frontend/styles/tema.css">
  <link rel="stylesheet" href="/Frontend/styles/responsive.css">
</head>

<body>

  <header class="site-header">
    <a href="/Frontend/index/lobby.html"><figure class="logo"><img src="/Media/Logo.png" alt="image/png"></figure></a>
    <nav class="main-nav">
        <a href="/Frontend/index/lobby.html">Inicio</a>
        <a href="/Frontend/index/servicios.html">Tratamientos</a>
        <a href="/Frontend/index/citas.html">Citas</a>
        <a href="/Frontend/index/contacto.html">Contacto</a>
        <a href="/Frontend/index/inicio.html">Inicio Sesion</a>
        <a id="theme-toggle" type="button">🌙</a>
    </nav>
  </header>

  <main>
    <h1>Diseño de Sonrisa</h1>
    <section class="contenedor-volver">
      <a href="/Frontend/index/servicios.html" class="btn-detalle"> Volver</a>
    </section>
    
    <img src="/Media/img/diseño de sonrisa.jpeg" alt="Diseño de sonrisa">
    <p>Transformación estética completa.</p>

    <ul>
      <li>Personalizado</li>
      <li>Alta estética</li>
    </ul>

    <p class="precio">Precio variable</p>
    
    <button id="agendarBtn" data-servicio="Diseño de sonrisa">Agendar cita</button>

    <div class="producto" data-id="diseno-sonrisa" data-nombre="Diseño de Sonrisa" data-precio="20000">
        <button class="btn-agregar">Agregar al carrito</button>
    </div>

  </main>

  <script src="/Frontend/js/tema.js"></script>
  
  <script>
    document.getElementById("agendarBtn").addEventListener("click", function() {
      const servicio = this.getAttribute("data-servicio");
      window.location.href = "/Frontend/index/citas.html?servicio=" + encodeURIComponent(servicio);
    });
  </script>

  <script src="/Frontend/index/carrito/carrito.js"></script>

</body>
</html>

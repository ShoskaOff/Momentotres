<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="/Frontend/styles/inicio.css">
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/servicios.css">
    <link rel="stylesheet" href="/Frontend/styles/responsive.css">
    <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>

<header class="encabezado">
    <nav class="navegacion">
        <ul>
            <li><a href="/Frontend/index/lobby.html">Inicio</a></li>
            <li><a href="/Frontend/index/servicios.html">Tratamientos</a></li>
            <li><a href="/Frontend/index/PaginaUsuario/usuario.html">Citas</a></li>
            <li><a href="/Frontend/index/contacto.html">Contacto</a></li>
            <li><a href="/Frontend/index/inicio.html">Inicio Sesión</a></li>
        </ul>
    </nav>
</header>

<main class="principal">
    <section class="seccion-login">
        <article class="tarjeta">

            <header class="tarjeta-encabezado">
                <h1>Bienvenido</h1>
                <p>Accede a tus citas odontológicas</p>
            </header>

            <form id="formLogin" class="formulario">
                <fieldset>
                    <legend>Datos de acceso</legend>

                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" required>

                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" required>
                </fieldset>

                <button type="submit">Ingresar</button>
            </form>

        </article>
    </section>
</main>

<script type="module">
import { supabase } from "../../Database/supabaseClient.js";

document.getElementById("formLogin").addEventListener("submit", async (e) => {
    e.preventDefault();

    const correo = document.getElementById("correo").value;
    const clave = document.getElementById("clave").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email: correo,
        password: clave
    });

    if (error) {
        alert("Error al iniciar sesión");
        return;
    }

    // 🔥 OBTENER USUARIO LOGUEADO
    const { data: userData } = await supabase.auth.getUser();

    const userId = userData.user.id;

    // 🔥 BUSCAR EN TU TABLA USUARIOS
    const { data: usuario } = await supabase
        .from("Usuarios")
        .select("rol_id")
        .eq("auth_uuid", userId)
        .single();

    // 🔥 DECIDIR A DÓNDE VA
    if (usuario.rol_id === 1) {
        // 🛠️ ADMIN
        window.location.href = "/Frontend/index/PaginaAdmin/admin.html";
    } else {
        // 👤 USUARIO
        window.location.href = "/Frontend/index/PaginaUsuario/usuario.html";
    }
});
</script>

</body>
</html>

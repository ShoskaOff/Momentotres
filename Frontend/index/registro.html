<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Odontologia</title>

    <!-- 🔥 ORDEN CORRECTO DE CSS -->
    <link rel="stylesheet" href="/Frontend/styles/registro.css">
    <link rel="stylesheet" href="/Frontend/styles/servicios.css">
    <link rel="stylesheet" href="/Frontend/styles/tema.css"> <!-- SIEMPRE EL ÚLTIMO -->

    <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>

<header class="site-header">
    <a href="/Frontend/index/lobby.html">
        <figure class="logo">
            <img src="/Media/Logo.png" alt="Dentology Logo">
        </figure>
    </a>

    <nav class="main-nav">
        <a href="/Frontend/index/lobby.html">Inicio</a>
        <a href="/Frontend/index/servicios.html">Tratamientos</a>
        <a href="/Frontend/index/citas.html">Citas</a>
        <a href="/Frontend/index/contacto.html">Contacto</a>
        <a href="/Frontend/index/inicio.html">Inicio Sesión</a>
        <a id="theme-toggle">🌙</a>
        <a id="btnAdmin" href="/Frontend/index/PaginaAdmin/admin.html"></a>
    </nav>
</header>

<main class="principal">

    <section class="seccion-registro">
        <article class="tarjeta">

            <header class="tarjeta-encabezado">
                <h1>Crear cuenta</h1>
                <p>Regístrate para agendar tus citas</p>
            </header>

            <form id="formRegistro" class="formulario">

                <fieldset>
                    <legend>Información</legend>

                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" required>

                    <label for="correo">Correo</label>
                    <input type="email" id="correo" required>

                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" required>

                    <label for="confirmarClave">Confirmar contraseña</label>
                    <input type="password" id="confirmarClave" required>
                </fieldset>

                <!-- 🔥 BOTÓN CORREGIDO -->
                <button type="submit" class="btn-global">
                    Registrarse
                </button>

            </form>

            <footer class="tarjeta-pie">
                <p>
                    ¿Ya tienes cuenta?
                    <a href="/Frontend/index/inicio.html">Inicia sesión</a>
                </p>
            </footer>

        </article>
    </section>

</main>

<!-- JS REGISTRO -->
<script type="module">
import { supabase } from "/Frontend/js/supabase.js";

document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("formRegistro");

    if (!form) return;

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const correo = document.getElementById("correo").value.trim();
        const clave = document.getElementById("clave").value.trim();
        const confirmar = document.getElementById("confirmarClave").value.trim();

        if (!correo || !clave || !confirmar) {
            alert("Completa todos los campos");
            return;
        }

        if (clave !== confirmar) {
            alert("Las contraseñas no coinciden");
            return;
        }

        const { data: authData, error: authError } = await supabase.auth.signUp({
            email: correo,
            password: clave
        });

        if (authError) {
            if (authError.message.includes("User already registered")) {
                alert("Este correo ya está registrado. Inicia sesión.");
                window.location.href = "/Frontend/index/inicio.html";
                return;
            }

            console.error(authError);
            alert(authError.message || "Error al registrar usuario");
            return;
        }

        if (!authData.user) {
            alert("No se pudo crear el usuario");
            return;
        }

        const authUUID = authData.user.id;

        const { data: usuarioExiste } = await supabase
            .from("Usuarios")
            .select("id")
            .eq("auth_uuid", authUUID)
            .maybeSingle();

        if (!usuarioExiste) {
            const { error: insertError } = await supabase
                .from("Usuarios")
                .insert([
                    {
                        auth_uuid: authUUID,
                        rol_id: 2
                    }
                ]);

            if (insertError) {
                console.error(insertError);
                alert("Error al guardar usuario");
                return;
            }
        }

        alert("Registro exitoso");
        window.location.href = "/Frontend/index/inicio.html";
    });

});
</script>

<script src="/Frontend/js/tema.js"></script>

</body>
</html>

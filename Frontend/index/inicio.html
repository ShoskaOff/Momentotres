<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="/Frontend/styles/inicio.css">
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/servicios.css">
    <link rel="stylesheet" href="/Frontend/styles/responsive.css">
    <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>

<header class="encabezado">
    <nav class="navegacion">
        <ul>
            <li><a href="/Frontend/index/lobby.html">Inicio</a></li>
            <li><a href="/Frontend/index/servicios.html">Tratamientos</a></li>
            <li><a href="/Frontend/index/citas.html">Citas</a></li>
            <li><a href="/Frontend/index/contacto.html">Contacto</a></li>
            <li><a href="/Frontend/index/inicio.html">Inicio Sesión</a></li>
        </ul>
    </nav>
</header>

<main class="principal">
    <section class="seccion-login">
        <article class="tarjeta">

            <header class="tarjeta-encabezado">
                <h1>Bienvenido</h1>
                <p>Accede a tus citas odontológicas</p>
            </header>

            <form id="formLogin" class="formulario">
                <fieldset>
                    <legend>Datos de acceso</legend>

                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" required>

                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" required>
                </fieldset>

                <button type="submit">Ingresar</button>
            </form>

            <footer class="tarjeta-pie">
                <p>¿No tienes cuenta?</p>
                <a href="/Frontend/index/registro.html" class="btn-registro">
                    Crear cuenta
                </a>
            </footer>
            
        </article>
    </section>
</main>

<script type="module" src="/Frontend/js/usuarios.js"></script>

</body>
</html>

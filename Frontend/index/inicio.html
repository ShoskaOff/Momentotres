<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="/Frontend/styles/inicio.css">
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/servicios.css">
    <link rel="stylesheet" href="/Frontend/styles/responsive.css">
    <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>

    <header class="site-header">
        <a href="/Frontend/index/lobby.html">
            <figure class="logo"><img src="/Media/Logo.png" alt="image/png"></figure>
        </a>
        <nav class="main-nav">
            <a href="/Frontend/index/lobby.html">Inicio</a>
            <a href="/Frontend/index/servicios.html">Tratamientos</a>
            <a href="/Frontend/index/citas.html">Citas</a>
            <a href="/Frontend/index/contacto.html">Contacto</a>
            <a href="/Frontend/index/inicio.html">Inicio Sesion</a>
            
            <a id="theme-toggle" type="button">🌙</a>
            <a id="btnAdmin" type="button" href="/Frontend/index/PaginaAdmin/admin.html">
            </a>
        </nav>
    </header>

<main class="principal">
    <section class="seccion-login">
        <article class="tarjeta">

            <header class="tarjeta-encabezado">
                <h1>Bienvenido</h1>
                <p>Accede a tus citas odontológicas</p>
            </header>

            <form id="formLogin" class="formulario">
                <fieldset>
                    <legend>Datos de acceso</legend>

                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" required>

                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" required>
                </fieldset>

                <button type="submit">Ingresar</button>
            </form>

            <footer class="tarjeta-pie">
                <p>¿No tienes cuenta?</p>
                <a href="/Frontend/index/registro.html" class="btn-registro">
                    Crear cuenta
                </a>
            </footer>
            
        </article>
    </section>
</main>

    <footer class="pie-pagina">
        <nav class="footer_navegacion">
            <p class="contenido_footer">Términos de Servicio</p>
            <p class="contenido_footer">Política de Privacidad</p>
        </nav>
        <aside class="barra_inferior">
            <p class="derechos_reservados">©DENTOLOGY. Todos los derechos reservados.</p>
        </aside>
    </footer>

    <script>
        document.getElementById("formLogin").addEventListener("submit", function (e) {
            e.preventDefault();
            alert("Inicio de sesion correcto");
        });
    </script>
    <script src="/Frontend/js/tema.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="titulo_gestion_citas">Gestión de Citas - DENTOLOGY</title>
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/PaginaAdmin/admin.css">
    <link rel="stylesheet" href="/Frontend/styles/idioma.css">
    <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>
    
    <button class="menu-hamburguesa" id="btnHamburguesa">☰</button>

    <aside class="sidebar" id="sidebar">
        <a href="/Frontend/index/lobby.html" class="logo">
            <img src="/Media/Logo.png" alt="DENTOLOGY">
        </a>
        <nav class="main-nav">
            <a data-i18n="inicio" href="/Frontend/index/lobby.html">Pagina</a>
            <a data-i18n="panel_admin_nav" href="/Frontend/index/PaginaAdmin/admin.html">Panel de Administración</a>
            <a data-i18n="gestion_citas_nav" href="/Frontend/index/PaginaAdmin/gestionCitas.html" class="activo">Gestión de Citas</a>
            <a data-i18n="gestion_usuarios_nav" href="/Frontend/index/PaginaAdmin/gestionUsuario.html">Gestión de Usuarios</a>
        </nav>

        <section class="idioma-sidebar">
            <button id="btn-es" type="button" class="btn-lang">🇪🇸 ES</button>
            <button id="btn-en" type="button" class="btn-lang">🇺🇸 EN</button>
        </section>

        <section class="sidebar-footer">
            <a href="/Frontend/index/inicio.html" id="btnCerrarSesion" type="button">
                <span data-i18n="cerrar_sesion">🚪 Cerrar Sesión</span>
            </a>
        </section>
    </aside>

    <header class="admin-topbar">
        <output id="info-admin-logueado"></output>
        <button id="theme-toggle" class="btn-tema" type="button" aria-label="Cambiar tema">🌙</button>
    </header>

    <main class="admin-content">
        <header class="admin-header-section">
            <h1 data-i18n="gestion_citas_h1">Gestión de Citas</h1>
        </header>

        <section class="admin-filtros">
            <input type="search" id="buscarCita" data-i18n-placeholder="placeholder_buscar_cita" placeholder="Buscar por paciente o documento..." class="input-busqueda">
            <input type="date" id="filtroFechaCita" class="select-filtro" aria-label="Filtrar por fecha">
            
            <select id="filtroEstadoCita" class="select-filtro" aria-label="Filtrar por estado">
                <option value="todas" data-i18n="estado_todas">Todos los estados</option>
                <option value="pendiente" data-i18n="estado_pendiente">Pendientes</option>
                <option value="confirmada" data-i18n="estado_confirmada">Confirmadas</option>
                <option value="completada" data-i18n="estado_completada">Completadas</option>
                <option value="cancelada" data-i18n="estado_cancelada">Canceladas</option>
            </select>
        </section>

        <section class="admin-section">
            <article id="crud-tabla-gestion-citas" class="crud-contenedor"></article>
        </section>

        <dialog id="modalDetalleCita" class="modal-crud"></dialog>

    </main>

    <footer class="pie-pagina-admin">
        <p data-i18n="derechos">©2026 DENTOLOGY. Todos los derechos reservados.</p>
    </footer>

    <script src="/Frontend/js/tema.js"></script>
    <script src="/Frontend/js/idioma.js"></script>
    <script src="/Frontend/js/admin.js"></script>
</body>

</html>

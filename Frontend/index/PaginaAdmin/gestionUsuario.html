<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="gestion_usuarios_titulo">Gestión de Usuarios - DENTOLOGY</title>
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/PaginaAdmin/admin.css">
    <link rel="stylesheet" href="/Frontend/styles/idioma.css"> 
    <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>
    
    <button class="menu-hamburguesa" id="btnHamburguesa">☰</button>

    <aside class="sidebar" id="sidebar">
        <a href="/Frontend/index/lobby.html" class="logo">
            <img src="/Media/Logo.png" alt="DENTOLOGY">
        </a>
        <nav class="main-nav">
            <a data-i18n="pagina" href="/Frontend/index/lobby.html">Pagina</a>
            <a data-i18n="panel_admin" href="/Frontend/index/PaginaAdmin/admin.html">Panel de Administración</a>
            <a data-i18n="gestion_citas" href="/Frontend/index/PaginaAdmin/gestionCitas.html">Gestión de Citas</a>
            <a data-i18n="gestion_usuarios" href="/Frontend/index/PaginaAdmin/gestionUsuario.html" class="activo">Gestión de Usuarios</a>
        </nav>
        <section class="sidebar-footer">
            <a href="/Frontend/index/inicio.html" id="btnCerrarSesion">
                <span data-i18n="cerrar_sesion">🚪 Cerrar Sesión</span>
            </a>
        </section>
    </aside>

    <header class="admin-topbar">
        <output id="info-admin-logueado"></output>
        
        <div class="topbar-controls" style="display: flex; align-items: center; gap: 15px; margin-left: auto;">
            <div class="idioma-selector">
                <button id="btn-es" type="button" class="btn-lang">🇪🇸</button>
                <button id="btn-en" type="button" class="btn-lang">🇺🇸</button>
            </div>
            <button id="theme-toggle" class="btn-tema" type="button" aria-label="Cambiar tema">🌙</button>
        </div>
    </header>

    <main class="admin-content">
        <header class="admin-header-section">
            <h1 data-i18n="gestion_usuarios_roles">Gestión de Usuarios y Roles</h1>
        </header>

        <section class="admin-filtros">
            <input type="search" id="buscarUsuario" placeholder="Buscar por nombre o correo..." class="input-busqueda" data-i18n-placeholder="buscar_placeholder">
            
            <select id="filtroRol" class="select-filtro" aria-label="Filtrar por rol">
                <option value="todos" data-i18n="todos_roles">Todos los roles</option>
                <option value="paciente" data-i18n="rol_paciente">Pacientes</option>
                <option value="admin" data-i18n="rol_admin">Administradores</option>
            </select>
        </section>

        <section class="admin-section">
            <article id="crud-tabla-usuarios" class="crud-contenedor"></article>
        </section>

        <dialog id="modalUsuario" class="modal-crud"></dialog>

    </main>

    <footer class="pie-pagina-admin">
        <p>©DENTOLOGY. <span data-i18n="derechos">Todos los derechos reservados.</span></p>
    </footer>

    <script src="/Frontend/js/idioma.js"></script> 
    <script src="/Frontend/js/tema.js"></script>
    <script type="module" src="/Frontend/js/admin.js"></script>
</body>

</html>

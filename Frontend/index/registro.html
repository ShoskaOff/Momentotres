<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="registro_titulo_pestana">Registro | Odontologia</title>
    <link rel="stylesheet" href="/Frontend/styles/registro.css">
    <link rel="stylesheet" href="/Frontend/styles/tema.css">
    <link rel="stylesheet" href="/Frontend/styles/servicios.css">
    <link rel="stylesheet" href="../styles/idioma.css"> <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>

    <header class="site-header">
        <a href="/Frontend/index/lobby.html">
            <figure class="logo"><img src="/Media/Logo.png" alt="image/png"></figure>
        </a>
        <nav class="main-nav">
            <a data-i18n="inicio" href="/Frontend/index/lobby.html">Inicio</a>
            <a data-i18n="tratamientos" href="/Frontend/index/servicios.html">Tratamientos</a>
            <a data-i18n="citas" href="/Frontend/index/citas.html">Citas</a>
            <a data-i18n="contacto" href="/Frontend/index/contacto.html">Contacto</a>
            <a data-i18n="login" href="/Frontend/index/inicio.html">Inicio Sesion</a>
            
            <a id="theme-toggle" type="button">🌙</a>

            <button id="btn-es" type="button" aria-label="Español">🇪🇸</button>
            <button id="btn-en" type="button" aria-label="English">🇺🇸</button>

            <a id="btnAdmin" type="button" href="/Frontend/index/PaginaAdmin/admin.html"></a>
        </nav>
    </header>

<main class="principal">
    <section class="seccion-registro">
        <article class="tarjeta">

            <header class="tarjeta-encabezado">
                <h1 data-i18n="crear_cuenta">Crear cuenta</h1>
                <p data-i18n="subtitulo_registro">Regístrate para agendar tus citas</p>
            </header>

            <form id="formRegistro" class="formulario">
                <fieldset>
                    <legend data-i18n="leyenda_informacion">Información</legend>

                    <label data-i18n="nombre_completo">Nombre completo</label>
                    <input type="text" id="nombre" required>

                    <label data-i18n="correo_label">Correo</label>
                    <input type="email" id="correo" required>

                    <label data-i18n="pass_label">Contraseña</label>
                    <input type="password" id="clave" required>

                    <label data-i18n="confirmar_pass">Confirmar contraseña</label>
                    <input type="password" id="confirmarClave" required>
                </fieldset>

                <button type="submit" data-i18n="btn_registrarse">Registrarse</button>
            </form>

            <footer class="tarjeta-pie">
                <p>
                    <span data-i18n="tienes_cuenta">¿Ya tienes cuenta?</span> 
                    <a data-i18n="login" href="/Frontend/index/inicio.html">Inicia sesión</a>
                </p>
            </footer>

        </article>
    </section>
</main>

<script type="module">
import { supabase } from "/Frontend/js/supabase.js";

document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("formRegistro");

    if (!form) return;

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const correo = document.getElementById("correo").value.trim();
        const clave = document.getElementById("clave").value.trim();

        if (!correo || !clave) {
            alert("Completa todos los campos");
            return;
        }

        const { data: authData, error: authError } = await supabase.auth.signUp({
            email: correo,
            password: clave
        });

        if (authError) {
            if (authError.message.includes("User already registered")) {
                alert("Este correo ya está registrado. Inicia sesión.");
                window.location.href = "/Frontend/index/inicio.html";
                return;
            }

            console.error(authError);
            alert(authError.message || "Error al registrar usuario");
            return;
        }

        if (!authData.user) {
            alert("No se pudo crear el usuario");
            return;
        }

        const authUUID = authData.user.id;

        const { data: usuarioExiste, error: buscarError } = await supabase
            .from("Usuarios")
            .select("id")
            .eq("auth_uuid", authUUID)
            .maybeSingle();

        if (buscarError) {
            console.error(buscarError);
        }

        if (!usuarioExiste) {
            const { error: insertError } = await supabase
                .from("Usuarios")
                .insert([
                    {
                        auth_uuid: authUUID,
                        rol_id: 2
                    }
                ]);

            if (insertError) {
                console.error(insertError);
                alert(insertError.message || "Error al guardar usuario en Usuarios");
                return;
            }
        }

        alert("Registro exitoso");
        window.location.href = "/Frontend/index/inicio.html";
    });
});
</script>

<script src="/Frontend/js/tema.js"></script>
<script src="../js/idioma.js"></script>
 </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DENTOLOGY</title>
    <link rel="stylesheet" href="/Frontend/styles/servicios.css" />
    <link rel="stylesheet" href="/Frontend/styles/tema.css" />

    <link rel="icon" href="/Media/favicon.png" type="image/png" />
    <link rel="icon" href="/Media/favicon.png" type="image/png" />
  </head>

  <body>
    <header class="site-header">
      <a href="/Frontend/index/lobby.html"
        ><figure class="logo">
          <img src="/Media/Logo.png" alt="image/png" /></figure
      ></a>
      <nav class="main-nav">
        <a href="/Frontend/index/lobby.html">Inicio</a>
        <a href="/Frontend/index/servicios.html">Tratamientos</a>
        <a href="/Frontend/index/citas.html">Citas</a>
        <a href="/Frontend/index/contacto.html">Contacto</a>
        <a href="/Frontend/index/inicio.html">Inicio Sesion</a>
        <a href="/Frontend/index/carrito/carritoo.html" id="carritoIcono">🛒</a>
        <a id="theme-toggle" type="button">🌙</a>

        <dialog id="panelCRUD">
          <h2>Gestión de Servicios</h2>

          <form id="formServicio">
            <input type="hidden" id="servicioId" />

            <label>Nombre</label>
            <input type="text" id="nombre" required />

            <label>Precio</label>
            <input type="number" id="precio" required />

            <label>Descripción</label>
            <textarea id="descripcion"></textarea>

            <label>Imagen (URL)</label>
            <input type="text" id="imagen" />

            <button type="submit">Guardar</button>
          </form>

          <hr />

          <section id="listaCRUD"></section>

          <button onclick="cerrarPanel()">Cerrar</button>
        </dialog>
      </nav>
    </header>

    <main>
      <section class="titulo-tratamientos">
        <h1>Tratamientos Odontológicos</h1>
      </section>

      <section class="tratamientos-grid">
        <section class="contenedor-servicios"></section>
      </section>
      <dialog id="modalDetalle">
        <header>
          <h2 id="titulo"></h2>
        </header>
        <figure>
          <img id="imagen" src="" alt="Tratamiento" />
          <figcaption id="descripcionCorta"></figcaption>
        </figure>
        <p id="descripcion"></p>
        <ul id="beneficios"></ul>
        <footer>
          <p id="precio"></p>
          <button id="agendarBtn">Agendar Cita</button>
          <button id="cerrarBtn">Cerrar</button>
        </footer>
      </dialog>
    </main>
    <script type="module" src="../js/servicios.js"></script>
    <footer class="pie-pagina">
      <nav class="footer_navegacion">
        <p class="contenido_footer">Términos de Servicio</p>
        <p class="contenido_footer">Política de Privacidad</p>
      </nav>
      <aside class="barra_inferior">
        <p class="derechos_reservados">
          ©DENTOLOGY. Todos los derechos reservados.
        </p>
      </aside>
    </footer>
  </body>
</html>

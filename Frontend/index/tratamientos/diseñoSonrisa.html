<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="titulo_diseno">Diseño de Sonrisa</title>
  <link rel="stylesheet" href="/Frontend/styles/servicios.css">
  <link rel="stylesheet" href="/Frontend/styles/tratamientos.css">
  <link rel="stylesheet" href="/Frontend/styles/tema.css">
  <link rel="stylesheet" href="/Frontend/styles/responsive.css">
  <link rel="stylesheet" href="/Frontend/styles/idioma.css">
  
  <link rel="icon" href="/Media/favicon.png" type="image/png">
</head>

<body>

  <header class="site-header">
    <a href="/Frontend/index/lobby.html">
        <figure class="logo"><img src="/Media/Logo.png" alt="DENTOLOGY"></figure>
    </a>
    <nav class="main-nav">
        <a data-i18n="inicio" href="/Frontend/index/lobby.html">Inicio</a>
        <a data-i18n="tratamientos" href="/Frontend/index/servicios.html">Tratamientos</a>
        <a data-i18n="citas" href="/Frontend/index/PaginaUsuario/usuario.html">Citas</a>
        <a data-i18n="contacto" href="/Frontend/index/contacto.html">Contacto</a>
        <a data-i18n="login" href="/Frontend/index/inicio.html">Inicio Sesion</a>
        
        <a id="theme-toggle" style="cursor: pointer;">🌙</a>

        <button id="btn-es" type="button" aria-label="Español">🇪🇸</button>
        <button id="btn-en" type="button" aria-label="English">🇺🇸</button>
    </nav>
  </header>

  <main>
    <h1 data-i18n="diseno_h1">Diseño de Sonrisa</h1>
    <section class="contenedor-volver">
      <a data-i18n="volver_btn" href="/Frontend/index/servicios.html" class="btn-detalle"> Volver</a>
    </section>
    
    <img src="/Media/img/diseño de sonrisa.jpeg" alt="Diseño de sonrisa">
    <p data-i18n="diseno_desc">Transformación estética completa.</p>

    <ul>
      <li data-i18n="diseno_beneficio_1">Personalizado</li>
      <li data-i18n="diseno_beneficio_2">Alta estética</li>
    </ul>

    <p class="precio" data-i18n="precio_variable">Precio variable</p>
    
    <button id="agendarBtn" data-i18n="agendar_cita_btn" data-servicio="Diseño de sonrisa">Agendar cita</button>

    <div class="producto" data-id="diseno-sonrisa" data-nombre="Diseño de Sonrisa" data-precio="20000">
        <button class="btn-agregar" data-i18n="agregar_carrito">Agregar al carrito</button>
    </div>

  </main>

  <footer class="pie-pagina">
      <nav class="footer_navegacion">
          <p data-i18n="terminos" class="contenido_footer">Términos de Servicio</p>
          <p data-i18n="privacidad" class="contenido_footer">Política de Privacidad</p>
      </nav>
      <aside class="barra_inferior">
          <p data-i18n="derechos" class="derechos_reservados">©2026 DENTOLOGY. Todos los derechos reservados.</p>
      </aside>
  </footer>

  <script src="/Frontend/js/tema.js"></script>
  <script src="/Frontend/js/idioma.js"></script>
  
  <script>
    document.getElementById("agendarBtn").addEventListener("click", function() {
      const servicio = this.getAttribute("data-servicio");
      window.location.href = "/Frontend/index/citas.html?servicio=" + encodeURIComponent(servicio);
    });
  </script>

  <script src="/Frontend/index/carrito/carrito.js"></script>

</body>
</html>
